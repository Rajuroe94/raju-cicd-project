apiVersion: apps/v1
kind: Deployment
metadata:
  name: raju-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: raju-app
  template:
    metadata:
      labels:
        app: raju-app
    spec:
      containers:
      - name: raju-app
        image: rajuroe/raju-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: raju-app-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: raju-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
